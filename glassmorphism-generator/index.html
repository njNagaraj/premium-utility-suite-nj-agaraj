<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism Generator - High-End CSS Effects</title>
    <meta property="og:description" content="Design stunning premium glassmorphism effects with live CSS preview.">
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Glassmorphism UI Generator",
      "operatingSystem": "All",
      "applicationCategory": "DesignApplication",
      "description": "Design stunning premium glassmorphism effects with live CSS preview.",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
    }
    </script>
    <meta name="description" content="Generate professional Glassmorphism CSS effects with real-time blur, saturation, and opacity controls. 100% browser-based.">
    <style>
        :root {
            --bg: #0f172a;
            --accent: #3b82f6;
            --text: #f8fafc;
            --card: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4rem 1.5rem;
            min-height: 100vh;
        }
        .container { max-width: 1000px; width: 100%; }
        .header { text-align: center; margin-bottom: 3rem; }
        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        p { color: #94a3b8; font-size: 1.1rem; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 2rem; border-radius: 24px; backdrop-filter: blur(10px); }
        
        .preview-area {
            height: 350px;
            border-radius: 20px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .glass-box {
            width: 250px;
            height: 150px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 32px 0 rgba(0,0,0,0.37);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
        }

        .input-group { margin-bottom: 1.5rem; }
        label { display: block; font-size: 0.8rem; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
        input[type="range"] { width: 100%; accent-color: var(--accent); cursor: ew-resize; }
        
        .code-box {
            background: #000;
            padding: 1.5rem;
            border-radius: 12px;
            font-family: 'JetBrains Mono', monospace;
            color: #10b981;
            font-size: 0.85rem;
            white-space: pre-wrap;
            margin-top: 1rem;
            border: 1px solid var(--border);
        }
        .privacy-badge {
            display: inline-block;
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            padding: 0.4rem 1rem;
            border-radius: 99px;
            font-size: 0.8rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Glassmorphism Generator</h1>
            <p><strong>Professional Design Utility:</strong> Create sophisticated Glassmorphism components for your next web project. All processing is 100% local.</p>
            <div class="privacy-badge">🛡️ Client-Side Only. No Data Uploaded.</div>
        </div>

        <div class="grid">
            <div class="card">
                <div class="input-group">
                    <label>Blur Intensity (<span id="blurVal">10</span>px)</label>
                    <input type="range" id="blur" min="0" max="40" value="10" oninput="update()">
                </div>
                <div class="input-group">
                    <label>Opacity (<span id="opacityVal">0.4</span>)</label>
                    <input type="range" id="opacity" min="0" max="1" step="0.01" value="0.4" oninput="update()">
                </div>
                <div class="input-group">
                    <label>Saturation (<span id="saturateVal">150</span>%)</label>
                    <input type="range" id="saturate" min="0" max="300" value="150" oninput="update()">
                </div>
                <div class="input-group">
                    <label>Border Radius (<span id="radiusVal">16</span>px)</label>
                    <input type="range" id="radius" min="0" max="100" value="16" oninput="update()">
                </div>
            </div>

            <div class="card">
                <div class="preview-area" id="bg">
                    <div class="glass-box" id="glass">PREVIEW</div>
                </div>
                <div class="code-box" id="code"></div>
            </div>
        </div>
    </div>

    <script>
        function update() {
            const b = document.getElementById('blur').value;
            const o = document.getElementById('opacity').value;
            const s = document.getElementById('saturate').value;
            const r = document.getElementById('radius').value;

            document.getElementById('blurVal').innerText = b;
            document.getElementById('opacityVal').innerText = o;
            document.getElementById('saturateVal').innerText = s;
            document.getElementById('radiusVal').innerText = r;

            const css = `background: rgba(255, 255, 255, ${o});
backdrop-filter: blur(${b}px) saturate(${s}%);
-webkit-backdrop-filter: blur(${b}px) saturate(${s}%);
border-radius: ${r}px;
border: 1px solid rgba(255, 255, 255, 0.2);
box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);`;

            document.getElementById('glass').style.cssText = css;
            document.getElementById('code').innerText = css;
        }
        update();
    </script>
</body>
</html>
