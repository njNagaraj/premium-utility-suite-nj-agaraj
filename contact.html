<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Premium Utility Suite</title>
    <style>
        :root { --bg: #0f172a; --text: #f8fafc; --accent: #6366f1; --border: #1e293b; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; max-width: 800px; margin: 4rem auto; padding: 0 1.5rem; }
        h1 { color: #fff; font-size: 2.5rem; margin-bottom: 2rem; border-bottom: 2px solid var(--accent); padding-bottom: 1rem; }
        .back-link { display: inline-block; margin-bottom: 2rem; color: var(--accent); text-decoration: none; font-weight: 600; }
        .back-link:hover { text-decoration: underline; }
        .contact-card { background: var(--border); padding: 3rem; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .email { font-size: 1.5rem; color: var(--accent); font-weight: 700; margin: 1.5rem 0; display: block; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Back to Tools</a>
    <h1>Get in Touch</h1>
    
    <div class="contact-card">
        <p>Have a suggestion for a new tool or need to report a bug? We'd love to hear from you.</p>
        <span class="email">support@premiumutilitysuite.com</span>
        <p style="font-size: 0.9rem; color: #64748b;">We typically respond within 24-48 business hours.</p>
    </div>

    <footer style="margin-top: 4rem; padding-top: 2rem; border-top: 1px solid var(--border); text-align: center; color: #64748b; font-size: 0.85rem;">
        &copy; 2026 Premium Utility Suite. All rights reserved.
    </footer>
</body>
</html>
